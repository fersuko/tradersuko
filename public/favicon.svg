<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="t" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#863bff"/>
    </linearGradient>
    <linearGradient id="s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fondo redondeado -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="url(#bg)" stroke="#00f0ff" stroke-width="1.5" opacity="0.9"/>
  <!-- Línea tipo gráfico / heartbeat -->
  <polyline points="8,32 14,28 20,32 26,20 32,26 38,16" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- T -->
  <text x="15" y="30" font-family="monospace" font-weight="900" font-size="22" fill="url(#t)" filter="url(#glow)">T</text>
  <!-- S -->
  <text x="26" y="30" font-family="monospace" font-weight="900" font-size="22" fill="url(#s)" filter="url(#glow)">S</text>
</svg>
